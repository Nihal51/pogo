name: Drive Buddy CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  static-site-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          test -f index.html
          test -f README.md

      - name: Basic HTML sanity check
        run: |
          grep -q "<html" index.html
          grep -q "Drive Buddy" index.html

      - name: Report
        run: echo "Static checks passed."
